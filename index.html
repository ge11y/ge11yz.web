<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ge11yz.web</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --card-bg: #111111;
      --text: #f0f0f0;
      --muted: #888888;
      --accent: #00ff88;
      --border: #222222;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 10px;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      color: var(--muted);
      font-size: 18px;
    }

    .sites {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .site-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .site-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 255, 136, 0.1);
    }

    .site-card h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .site-card p {
      color: var(--muted);
      font-size: 14px;
    }

    .site-card .arrow {
      display: inline-block;
      margin-top: 12px;
      color: var(--accent);
      font-size: 14px;
    }

    footer {
      text-align: center;
      margin-top: 80px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">ge11y<span>z</span>.webs</div>
      <p class="tagline">Project Hub</p>
    </header>

    <div class="sites">
      <a href="https://ge11y.github.io/ORDIMUTANTSDB/" class="site-card" target="_blank">
        <h2>🧬 OrdiMutants</h2>
        <p>Bitcoin NFT Collection</p>
        <span class="arrow">Visit →</span>
      </a>

      <a href="https://ge11y.github.io/COR.INTEGRATIVE/" class="site-card" target="_blank">
        <h2>🌿 COR Integrative Health</h2>
        <p>Holistic Health & Wellness</p>
        <span class="arrow">Visit →</span>
      </a>

      <a href="https://ge11y.github.io/team-portal/" class="site-card" target="_blank">
        <h2>👥 Team Portal</h2>
        <p>Team Management</p>
        <span class="arrow">Visit →</span>
      </a>

      <a href="https://askge11y-hj97-n0x4lk54o-ge11ys-projects.vercel.app" class="site-card" target="_blank">
        <h2>Ask Gelly</h2>
        <p>AI Sales Coaching — Pest Control</p>
        <span class="arrow">Visit →</span>
      </a>
    </div>

    <footer>
      <p>More projects coming soon</p>
    </footer>
  </div>
</body>
</html>
